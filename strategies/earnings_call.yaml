# Earnings Call Strategy / 业绩电话会解读

name: earnings_call
display_name: 业绩电话会解读
description: 解读财报发布后管理层电话会议（Earnings Call）的表态、指引和语气，追踪管理层此前承诺的兑现情况，判断事件是否已被市场充分定价。
category: framework
core_rules: [3, 5]
required_tools:
  - search_stock_news
  - get_realtime_quote
  - analyze_trend
  - get_stock_info
aliases: [业绩电话会, earnings call, 财报电话会议, 管理层电话会, CEO电话会]
default_priority: 46
market_regimes: [sector_hot, volatile]

instructions: |
  **业绩电话会解读策略（Earnings Call Strategy）**

  适用场景：
  - 公司刚发布季度/年度财报，且管理层召开了电话会议（earnings call / conference call）。
  - 需要判断电话会议中的表态是新的利好/利空催化，还是仅重复市场已知信息。
  - 需要追踪管理层此前在电话会议中做出的承诺（收入目标、产能规划、新品时间表、利润率目标等）本季度是否兑现。

  分析框架：

  1. **信息采集**
     - 使用 `search_stock_news` 检索本次财报发布日期前后 3 天内的电话会议纪要、要点摘要、分析师提问环节报道。
     - 明确电话会议召开的具体日期，避免使用过期或时间不明的信息。
     - 若找不到官方 transcript，可采用财经媒体（如 Seeking Alpha、路透、彭博、雪球、财联社等）的二手摘要，但需在结论中注明信息来源为"媒体摘要"而非"官方逐字稿"，降低置信度。

  2. **指引与承诺提取**
     - 提取管理层在本次电话会议中给出的**前瞻指引**（下季度/全年营收、利润率、资本开支、新产品/新产能时间表）。
     - 将这些指引记录为"新承诺"，标注具体数字、时间节点和责任主体（如"CEO 表示 Q3 将量产"）。
     - 如果历史对话或此前报告中已记录过管理层的旧承诺，对照检查本次电话会议是否兑现、延期还是下调，明确标注三种状态之一：**兑现 / 延期 / 下调（未达标）**。

  3. **语气与措辞分析**
     - 判断管理层语言是自信、模糊，还是防御性的（例如反复用"面临挑战""宏观不确定性"等措辞需要警惕）。
     - 关注分析师提问环节中管理层是否回避关键问题、答非所问，或对具体数字讳莫如深——这类信号往往比正面表态更重要。
     - 关注是否有意外的人事变动、审计/合规相关表态，一票否决优先于其他利好信息（对应核心理念 5：风险排查）。

  4. **市场反应验证**
     - 使用 `get_realtime_quote` 和 `analyze_trend` 检查电话会议后股价的实际反应（当日盘后/次日开盘、随后几个交易日）。
     - 判断是"利好落地但反应平淡"（可能已被市场提前定价）还是"指引低于预期引发抛售"或"超预期指引带动趋势反转"。
     - 结合成交量确认反应力度，避免仅凭单日涨跌下结论。

  5. **交易计划与评分调整**
     - 若为新承诺兑现 + 指引上调 + 市场未充分反应：可提高 sentiment_score，在 `buy_reason` 中注明"业绩电话会指引上调，兑现历史良好"。
     - 若为承诺连续第二次延期或下调：应显著下调 sentiment_score，并在风险提示中明确写出"管理层信誉存疑，历史承诺兑现率低"。
     - 若信息来源仅为媒体二手摘要而非官方纪要，评分调整幅度应适度收窄，并在报告中注明置信度较低。
     - 输出中应包含一个简短的"承诺追踪表"（本次新增承诺 / 历史承诺兑现状态），便于下一季度电话会议时复用比对。

  注意事项：
  - 不同市场电话会议习惯不同：美股（NVDA、AAPL 等）通常有官方 transcript 且分析师提问详细；A股/港股多为业绩说明会纪要或投资者关系纪要，颗粒度较粗，需相应调整置信度。
  - 电话会议纪要具有时效性，超过两个季度的旧纪要仅作为历史承诺对照依据，不能作为本次评分的直接输入。
